name: Deploy NTU EventConnect to AWS

on:
  push:
    branches: [ main, feature/cicd ]
  workflow_dispatch:  # 允許手動觸發

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 後端 Docker Build & Push 到 ECR 階段 ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Docker Image
        working-directory: ./backend
        run: |
          docker build -t ntu-backend:latest .
          docker tag ntu-backend:latest ${{ steps.login-ecr.outputs.registry }}/ntu-backend:latest
          docker tag ntu-backend:latest ${{ steps.login-ecr.outputs.registry }}/ntu-backend:${{ github.sha }}

      - name: Push Backend Image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/ntu-backend:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/ntu-backend:${{ github.sha }}

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
            --cluster ntu-backend-cluster \
            --service ntu-backend-task-service-5vmose4n \
            --force-new-deployment \
            --region ap-northeast-1
      # --- Frontend Build 階段 ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci # 使用 npm ci 確保完全依照 package-lock.json 安裝

      - name: Set Frontend Environment Variables
        working-directory: ./frontend
        run: |
          echo "VITE_API_URL=http://ntu-api-alb-1725363642.ap-northeast-1.elb.amazonaws.com" >> .env.production

      - name: Build React App
        working-directory: ./frontend
        run: npm run build

      - name: Sync to S3
        run: |
          # 將 build 出來的 dist 資料夾同步到 S3
          aws s3 sync ./frontend/dist s3://${{ secrets.AWS_S3_BUCKET }} --delete

      - name: CloudFront Cache Invalidation
        run: |
          # 強制清除 CDN 快取，確保使用者立刻看到新資料
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
