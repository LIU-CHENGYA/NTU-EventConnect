name: Deploy NTU EventConnect to AWS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- Python ETL 階段 ---
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # 自動快取相依套件

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt # 這裡會吃到你鎖定的 == 版本

      - name: Run ETL Crawlers
        run: |
          # 執行 build_mock.py 產出 frontend/src/mock/events.generated.json
          python fetch_data/build_mock.py

      # --- Frontend Build 階段 ---
      - name: Set up Node.js
        uses: actions/setup-python@v5 # 修正: 應為 actions/setup-node@v4
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci # 使用 npm ci 確保完全依照 package-lock.json 安裝

      - name: Build React App
        working-directory: ./frontend
        run: npm run build

      # --- AWS 部署階段 ---
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Sync to S3
        run: |
          # 將 build 出來的 dist 資料夾同步到 S3
          aws s3 sync ./frontend/dist s3://${{ secrets.AWS_S3_BUCKET }} --delete

      - name: CloudFront Cache Invalidation
        run: |
          # 強制清除 CDN 快取，確保使用者立刻看到新資料
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
