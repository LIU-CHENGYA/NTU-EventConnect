name: Deploy NTU EventConnect to AWS

on:
  push:
    branches: [ main, feature/cicd ]
  workflow_dispatch:  # 允許手動觸發

jobs:
  # 檢查哪些檔案變更了
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - 'fetch_data/**'
              - '.github/workflows/deploy.yml'

  # 後端部署 Job
  deploy-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Docker Image
        working-directory: ./backend
        run: |
          docker build --platform linux/amd64 -t ntu-backend:latest .
          docker tag ntu-backend:latest ${{ steps.login-ecr.outputs.registry }}/ntu-backend:latest
          docker tag ntu-backend:latest ${{ steps.login-ecr.outputs.registry }}/ntu-backend:${{ github.sha }}

      - name: Push Backend Image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/ntu-backend:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/ntu-backend:${{ github.sha }}

      - name: Force ECS Deployment
        run: |
          aws ecs update-service \
            --cluster gracious-fish-rizeya \
            --service ntu-backend-task-service-5vmose4n \
            --force-new-deployment \
            --region ap-northeast-1

  # 前端部署 Job
  deploy-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Set Frontend Environment Variables
        working-directory: ./frontend
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" >> .env.production

      - name: Build React App
        working-directory: ./frontend
        run: npm run build

      - name: Sync to S3
        run: |
          aws s3 sync ./frontend/dist s3://${{ secrets.AWS_S3_BUCKET }} --delete

      - name: CloudFront Cache Invalidation
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
